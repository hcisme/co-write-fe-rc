name: Deploy Frontend
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Test Connectivity
        run: |
          nc -zv -w 5 ${{ secrets.REMOTE_HOST }} ${{ secrets.REMOTE_PORT }}

      - name: Clean Remote Directory (Keep .well-known)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          port: ${{ secrets.REMOTE_PORT }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            find /www/wwwroot/cowrite.chcblogs.com/ -mindepth 1 -maxdepth 1 ! -name ".well-known" -exec rm -rf {} +

      - name: Upload new dist
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          port: ${{ secrets.REMOTE_PORT }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'dist/*'
          target: '/www/wwwroot/cowrite.chcblogs.com'
          strip_components: 1
